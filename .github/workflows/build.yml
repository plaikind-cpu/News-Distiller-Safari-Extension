name: Build Safari Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Apple Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: temp_keychain_password
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install Provisioning Profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          PROVISIONING_PROFILE_EXT_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXT }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/News-Distiller-Distribution.mobileprovision
          echo "$PROVISIONING_PROFILE_EXT_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/News-Distiller-Extension-Distribution.mobileprovision
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Convert web extension to Safari extension
        run: |
          xcrun safari-web-extension-converter . \
            --project-location ./build \
            --app-name "News-Distiller" \
            --bundle-identifier com.pklmedialab.news-distiller \
            --swift \
            --no-prompt \
            --force

      - name: Copy app icon
        run: |
          cp Resources/images/icon128.png "build/News-Distiller/Shared (App)/Resources/Icon.png"

      - name: Fix bundle IDs and provisioning profiles
        run: |
          PBXPROJ="build/News-Distiller/News-Distiller.xcodeproj/project.pbxproj"
          # Fix bundle ID case
          sed -i '' 's/com\.pklmedialab\.News-Distiller\.Extension/com.pklmedialab.news-distiller.extension/g' "$PBXPROJ"
          sed -i '' 's/com\.pklmedialab\.News-Distiller/com.pklmedialab.news-distiller/g' "$PBXPROJ"
          # Set CODE_SIGN_STYLE to Manual for all targets
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # Add provisioning profile specifiers for both targets
          # After each PRODUCT_BUNDLE_IDENTIFIER for the extension, add the extension profile
          python3 - << 'PYEOF'
          import re
          with open("build/News-Distiller/News-Distiller.xcodeproj/project.pbxproj", "r") as f:
              content = f.read()
          
          # Add PROVISIONING_PROFILE_SPECIFIER after CODE_SIGN_STYLE = Manual in each build config section
          # We'll use a targeted approach: find each Release/Debug config block and add the right profile
          
          # Replace any existing PROVISIONING_PROFILE_SPECIFIER lines first
          content = re.sub(r'\s*PROVISIONING_PROFILE_SPECIFIER = "[^"]*";', '', content)
          
          # Now add the correct specifier based on which bundle ID is in the same block
          def add_profile_specifier(match):
              block = match.group(0)
              if 'com.pklmedialab.news-distiller.extension' in block:
                  return block.replace(
                      'PRODUCT_BUNDLE_IDENTIFIER = "com.pklmedialab.news-distiller.extension";',
                      'PRODUCT_BUNDLE_IDENTIFIER = "com.pklmedialab.news-distiller.extension";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "News-Distiller-Extension-Distribution";'
                  )
              elif 'com.pklmedialab.news-distiller' in block:
                  return block.replace(
                      'PRODUCT_BUNDLE_IDENTIFIER = "com.pklmedialab.news-distiller";',
                      'PRODUCT_BUNDLE_IDENTIFIER = "com.pklmedialab.news-distiller";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "News-Distiller-Distribution";'
                  )
              return block
          
          # Match each build configuration block
          content = re.sub(r'\{[^{}]*PRODUCT_BUNDLE_IDENTIFIER[^{}]*\}', add_profile_specifier, content, flags=re.DOTALL)
          
          with open("build/News-Distiller/News-Distiller.xcodeproj/project.pbxproj", "w") as f:
              f.write(content)
          
          print("Done patching pbxproj")
          PYEOF
          
          echo "Bundle IDs:"
          grep "PRODUCT_BUNDLE_IDENTIFIER" "$PBXPROJ"
          echo "Provisioning profiles:"
          grep "PROVISIONING_PROFILE_SPECIFIER" "$PBXPROJ"

      - name: Build and sign the app
        env:
          KEYCHAIN_PASSWORD: temp_keychain_password
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          xcodebuild \
            -project "build/News-Distiller/News-Distiller.xcodeproj" \
            -scheme "News-Distiller (iOS)" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: PAUL KEVIN LAIKIND (4FPWPSM7JG)" \
            archive \
            -archivePath build/News-Distiller.xcarchive

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: News-Distiller-Safari-Extension
          path: build/
          retention-days: 30
