name: Build Safari Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List all PNG files
        run: find . -name "*.png"

      - name: Convert web extension to Safari extension
        run: |
          xcrun safari-web-extension-converter . --project-location ./build --app-name "News-Distiller" --bundle-identifier com.pklmedialab.news-distiller --swift --no-prompt --force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: News-Distiller-Safari-Extension
          path: build/
          retention-days: 30
