name: Build Safari Extension

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_26.0.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version

      - name: Install Apple Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: temp_keychain_password
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Install Provisioning Profiles
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          PROVISIONING_PROFILE_EXT_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_EXT }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/News-Distiller-Distribution.mobileprovision
          echo "$PROVISIONING_PROFILE_EXT_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/News-Distiller-Extension-Distribution.mobileprovision

      - name: Stage extension source
        run: |
          rm -rf extension-src
          mkdir -p extension-src
          # Copy only the actual web extension files — NOT the build scripts
          for f in manifest.json popup.html popup.js background.js content.js; do
            if [ -f "$f" ]; then cp "$f" extension-src/; fi
          done
          # Copy images
          if [ -d "Resources/images" ]; then
            mkdir -p extension-src/images
            cp Resources/images/*.png extension-src/images/ 2>/dev/null || true
          fi
          echo "=== extension-src contents ==="
          find extension-src -type f

      - name: Convert web extension to Safari extension
        run: |
          xcrun safari-web-extension-converter ./extension-src \
            --project-location ./build \
            --app-name "News-Distiller" \
            --bundle-identifier com.pklmedialab.news-distiller \
            --copy-resources \
            --swift \
            --no-prompt \
            --force

      - name: DIAGNOSTIC - inspect converter output
        run: |
          echo "=== Top-level build/ structure ==="
          ls -la build/ || true
          echo
          echo "=== Full file tree under build/ (first 200 entries) ==="
          find build -type f | head -200
          echo
          echo "=== Directory tree under build/ ==="
          find build -type d | sort
          echo
          echo "=== Looking for popup.html anywhere ==="
          find build -name "popup.html" -o -name "popup.js" -o -name "content.js" -o -name "background.js" -o -name "splash.png" || true
          echo
          echo "=== Looking for any Resources folder under build/ ==="
          find build -type d -name "Resources"
          echo
          echo "=== If Shared (Extension)/Resources exists, list its contents ==="
          if [ -d "build/News-Distiller/Shared (Extension)/Resources" ]; then
            ls -la "build/News-Distiller/Shared (Extension)/Resources/"
            find "build/News-Distiller/Shared (Extension)/Resources/" -type f
          else
            echo "Path does not exist"
          fi
          echo
          echo "=== project.pbxproj snippet — look at known files in extension target ==="
          if [ -f "build/News-Distiller/News-Distiller.xcodeproj/project.pbxproj" ]; then
            # Show resources section
            grep -E "popup\.html|popup\.js|background\.js|content\.js|manifest\.json" "build/News-Distiller/News-Distiller.xcodeproj/project.pbxproj" | head -30
          fi
          echo
          echo "=== END DIAGNOSTIC ==="

      - name: Copy icons and manifest
        run: python3 generate_icons.py

      - name: Fix bundle IDs and provisioning profiles
        run: python3 fix_pbxproj.py

      - name: Build and archive
        env:
          KEYCHAIN_PASSWORD: temp_keychain_password
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          xcodebuild \
            -project "build/News-Distiller/News-Distiller.xcodeproj" \
            -scheme "News-Distiller (iOS)" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: PAUL KEVIN LAIKIND (4FPWPSM7JG)" \
            DEVELOPMENT_TEAM=4FPWPSM7JG \
            CURRENT_PROJECT_VERSION=5 \
            MARKETING_VERSION=1.1 \
            archive \
            -archivePath build/News-Distiller.xcarchive

      - name: Inject manifest.json into archive
        run: |
          APPEX=$(find build/News-Distiller.xcarchive -name "*.appex" | head -1)
          echo "Found appex: $APPEX"
          cp manifest.json "$APPEX/manifest.json"
          echo "Copied manifest.json"

      - name: Create export options plist
        run: |
          cat > build/ExportOptions.plist << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>4FPWPSM7JG</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.pklmedialab.news-distiller</key>
              <string>News-Distiller-Distribution</string>
              <key>com.pklmedialab.news-distiller.extension</key>
              <string>News-Distiller-Extension-Distribution</string>
            </dict>
          </dict>
          </plist>
          PLISTEOF

      - name: Export IPA
        env:
          KEYCHAIN_PASSWORD: temp_keychain_password
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          xcodebuild \
            -exportArchive \
            -archivePath build/News-Distiller.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/IPA

      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/IPA/News-Distiller.ipa \
            --username "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --verbose

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: News-Distiller-IPA
          path: build/IPA/
          retention-days: 30
