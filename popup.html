<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News-Distiller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; min-height: 300px; background: #0d1b2a; color: #c0d0e0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; }
    .header { padding: 12px 14px; border-bottom: 1px solid #2a3a50; display: flex; align-items: center; justify-content: space-between; }
    .title { font-size: 15px; font-weight: 700; color: #11998E; }
    .sub { font-size: 10px; color: #6688aa; }
    .body { padding: 12px 14px; }
    .row { display: flex; gap: 6px; margin-bottom: 6px; }
    input[type=text] { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #2a3a50; border-radius: 6px; color: #c0d0e0; font-size: 11px; padding: 6px 8px; font-family: monospace; outline: none; }
    input[type=text]:focus { border-color: #0D6E6E; }
    .btn { background: rgba(13,110,110,0.2); color: #11998E; border: 1px solid #0D6E6E; border-radius: 5px; padding: 5px 10px; font-size: 10px; font-weight: 600; cursor: pointer; }
    .hint { font-size: 10px; color: #4a6080; margin-bottom: 10px; }
    .hint a { color: #a0d4ff; text-decoration: none; }
    .status { font-size: 10px; color: #4a6080; margin-bottom: 10px; }
    .status.ok { color: #1D9E75; }
    .url { background: rgba(255,255,255,0.04); border: 1px solid #2a3a50; border-radius: 6px; padding: 6px 10px; font-size: 10px; color: #6688aa; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .paste-label { font-size: 10px; color: #6688aa; margin-bottom: 4px; }
    textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid #2a3a50; border-radius: 6px; color: #c0d0e0; font-size: 11px; padding: 7px 10px; resize: vertical; outline: none; margin-bottom: 8px; min-height: 60px; font-family: -apple-system, sans-serif; }
    textarea:focus { border-color: #0D6E6E; }
    .btn-main { width: 100%; background: linear-gradient(135deg, #0D6E6E, #11998E); color: white; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 8px; }
    .btn-main:disabled { opacity: 0.4; cursor: default; }
    .error { background: #2a1010; border: 1px solid #4a2020; border-radius: 6px; padding: 7px 10px; font-size: 11px; color: #cc6666; margin-bottom: 8px; display: none; }
    .loading { text-align: center; padding: 16px; display: none; }
    .spinner { width: 24px; height: 24px; border: 3px solid rgba(13,110,110,0.2); border-top-color: #11998E; border-radius: 50%; animation: spin 0.85s linear infinite; margin: 0 auto 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results { display: none; }
    .result-label { font-size: 9px; font-weight: 700; color: #f0c040; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .summary { font-size: 12px; color: #d0e0f0; line-height: 1.7; margin-bottom: 10px; }
    .lean-bar { position: relative; height: 12px; border-radius: 6px; background: linear-gradient(to right, #2040a0, #888, #a02020); margin: 4px 0; }
    .lean-dot { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; background: white; border-radius: 50%; border: 2px solid #0d1b2a; }
    .lean-labels { display: flex; justify-content: space-between; font-size: 8px; color: #4a6080; }
    .lean-verdict { font-size: 11px; font-weight: 700; color: #e0e8f0; text-align: center; margin: 4px 0 8px; }
    .action-row { display: flex; gap: 6px; }
    .btn-sm { flex: 1; padding: 7px; border: none; border-radius: 6px; font-size: 10px; font-weight: 600; cursor: pointer; }
    .btn-copy { background: linear-gradient(135deg, #0D6E6E, #11998E); color: white; }
    .btn-new { background: rgba(255,255,255,0.05); color: #6688aa; border: 1px solid #2a3a50; }
    .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #1D9E75; color: white; border-radius: 8px; padding: 6px 14px; font-size: 11px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    .footer { text-align: center; padding: 8px; font-size: 9px; color: #4a6080; border-top: 1px solid #2a3a50; }
    .footer a { color: #6688aa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">News-Distiller</div>
      <div class="sub">AI-Powered News Summarizer</div>
    </div>
    <a href="https://pklmedialab.com" target="_blank" style="font-size:10px;color:#6688aa;text-decoration:none;">PKLMediaLab</a>
  </div>
  <div class="body">
    <div class="row">
      <input type="text" id="codeInput" placeholder="Distiller Pack code..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      <button class="btn" onclick="saveCode()">Save</button>
      <button class="btn" onclick="testCode()">Test</button>
    </div>
    <div class="hint">Need a code? <a href="https://pklmedialab.com/nd-get-started.html" target="_blank">Get a Distiller Pack →</a></div>
    <div class="status" id="codeStatus">No code saved — using free distillations.</div>
    <div class="url" id="urlDisplay">Loading...</div>
    <div class="paste-label">Or paste article text (for paywalled sites):</div>
    <textarea id="pasteArea" placeholder="Paste article text here..."></textarea>
    <button class="btn-main" id="distillBtn" onclick="distill()">Distill This Page</button>
    <div class="error" id="errorBox"></div>
    <div class="loading" id="loadingBox">
      <div class="spinner"></div>
      <div style="font-size:11px;color:#6688aa;">Distilling article...</div>
    </div>
    <div class="results" id="resultsBox">
      <div class="result-label">Summary</div>
      <div class="summary" id="summaryEl"></div>
      <div id="leanBox" style="display:none;">
        <div class="result-label">Political Lean</div>
        <div class="lean-labels"><span>Left</span><span>Center</span><span>Right</span></div>
        <div class="lean-bar"><div class="lean-dot" id="leanDot" style="left:50%"></div></div>
        <div class="lean-verdict" id="leanVerdict"></div>
      </div>
      <div class="action-row">
        <button class="btn-sm btn-copy" onclick="copyResult()">Copy Summary</button>
        <button class="btn-sm btn-new" onclick="reset()">New</button>
      </div>
    </div>
  </div>
  <div class="footer"><a href="https://app.news-distiller.com" target="_blank">Open Web App</a> · <a href="https://app.news-distiller.com/help.html" target="_blank">Help</a></div>
  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
