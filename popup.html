<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News-Distiller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      min-height: 400px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #c0d0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* Splash */
    .splash {
      width: 100%;
      display: block;
      border-bottom: 1px solid rgba(102,126,234,0.3);
    }

    /* Header */
    .header {
      padding: 10px 14px 8px;
      border-bottom: 1px solid rgba(102,126,234,0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 14px; font-weight: 700; color: #e0e8f0; }
    .header-sub { font-size: 10px; color: #6688aa; }
    .web-app-btn {
      font-size: 10px; color: #a0b4ff;
      background: rgba(102,126,234,0.15);
      border: 1px solid rgba(102,126,234,0.3);
      border-radius: 10px; padding: 3px 8px;
      text-decoration: none; cursor: pointer;
    }

    /* Body */
    .body { padding: 12px 14px; }

    /* Auth */
    .auth-row {
      display: flex; gap: 6px; margin-bottom: 10px; align-items: center;
    }
    .auth-row input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid #2a3a50;
      border-radius: 6px; color: #c0d0e0;
      font-size: 11px; padding: 6px 8px;
      font-family: monospace; outline: none;
    }
    .auth-row input:focus { border-color: #667eea; }
    .btn-sm {
      background: rgba(102,126,234,0.2);
      color: #a0b4ff; border: 1px solid rgba(102,126,234,0.3);
      border-radius: 5px; padding: 5px 10px;
      font-size: 10px; font-weight: 600; cursor: pointer;
    }
    .code-status { font-size: 10px; color: #4a6080; margin-bottom: 10px; }
    .code-status.ok { color: #1D9E75; }
    .code-status.err { color: #cc4444; }

    /* URL display */
    .url-display {
      background: rgba(255,255,255,0.04);
      border: 1px solid #2a3a50;
      border-radius: 6px; padding: 7px 10px;
      font-size: 10px; color: #6688aa;
      margin-bottom: 10px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Distill button */
    .btn-distill {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 8px;
      padding: 10px; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
      margin-bottom: 10px;
    }
    .btn-distill:hover { opacity: 0.88; }
    .btn-distill:disabled { opacity: 0.4; cursor: default; }

    /* Warning */
    .warning {
      background: #2a1f00; border: 1px solid #4a3a00;
      border-radius: 6px; padding: 7px 10px;
      font-size: 10px; color: #cc8800; margin-bottom: 10px;
      display: none;
    }
    .warning.visible { display: block; }

    /* Error */
    .error-box {
      background: #2a1010; border: 1px solid #4a2020;
      border-radius: 6px; padding: 7px 10px;
      font-size: 11px; color: #cc6666;
      margin-bottom: 10px; display: none;
    }
    .error-box.visible { display: block; }

    /* Loading */
    .loading { text-align: center; padding: 20px; display: none; }
    .loading.visible { display: block; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(102,126,234,0.2); border-top-color: #667eea;
      border-radius: 50%; animation: spin 0.85s linear infinite;
      margin: 0 auto 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; color: #6688aa; }

    /* Results */
    .results { display: none; }
    .results.visible { display: block; }

    .result-label {
      font-size: 9px; font-weight: 700; color: #f0c040;
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    .summary-text {
      font-size: 12px; color: #d0e0f0; line-height: 1.7;
      margin-bottom: 10px; padding-bottom: 10px;
      border-bottom: 1px solid rgba(102,126,234,0.15);
    }

    /* Lean meter */
    .lean-section { margin-bottom: 10px; }
    .lean-meter {
      position: relative; height: 14px; border-radius: 7px;
      background: linear-gradient(to right, #2040a0, #3060c0, #888, #c06030, #a02020);
      margin-bottom: 4px;
    }
    .lean-marker {
      position: absolute; top: 50%; transform: translate(-50%, -50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: white; border: 2px solid #0d1b2a;
      transition: left 0.5s ease;
    }
    .lean-labels {
      display: flex; justify-content: space-between;
      font-size: 8px; color: #4a6080;
    }
    .lean-verdict { font-size: 12px; font-weight: 700; color: #e0e8f0; text-align: center; margin-top: 4px; }

    /* Action buttons */
    .btn-row { display: flex; gap: 6px; margin-top: 10px; }
    .btn-action {
      flex: 1; padding: 7px; border: none; border-radius: 6px;
      font-size: 10px; font-weight: 600; cursor: pointer;
    }
    .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-new { background: rgba(102,126,234,0.15); color: #a0b4ff; }
    .btn-full { background: rgba(102,126,234,0.15); color: #a0b4ff; }
  </style>
</head>
<body>

<img src="images/splash.png" alt="News-Distiller" class="splash" onerror="this.style.display='none'"/>

<div class="header">
  <div>
    <div class="header-title">News-Distiller</div>
    <div class="header-sub">AI-powered news summarizer</div>
  </div>
  <a class="web-app-btn" href="https://app.news-distiller.com" target="_blank">Web App</a>
</div>

<div class="body">

  <!-- Auth -->
  <div class="auth-row">
    <input type="text" id="codeInput" placeholder="Distiller Pack code..."
      autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    <button class="btn-sm" onclick="saveCode()">Save</button>
  </div>
  <div class="code-status" id="codeStatus">Enter your Distiller Pack access code.</div>

  <!-- Current page URL -->
  <div class="url-display" id="urlDisplay">Loading page...</div>

  <!-- Distill button -->
  <button class="btn-distill" id="distillBtn" onclick="distillPage()">Distill This Page</button>

  <!-- Warning -->
  <div class="warning" id="warningBox"></div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Distilling article...</div>
  </div>

  <!-- Results -->
  <div class="results" id="resultsBox">
    <div class="result-label">Executive Summary</div>
    <div class="summary-text" id="summaryEl"></div>

    <div class="lean-section" id="leanSection" style="display:none;">
      <div class="result-label">Political Lean</div>
      <div class="lean-labels">
        <span>Left</span><span>Center</span><span>Right</span>
      </div>
      <div class="lean-meter">
        <div class="lean-marker" id="leanMarker" style="left:50%"></div>
      </div>
      <div class="lean-verdict" id="leanVerdict"></div>
    </div>

    <div class="btn-row">
      <button class="btn-action btn-save" onclick="saveSummary()">Save</button>
      <button class="btn-action btn-full" onclick="openWebApp()">Full Report</button>
      <button class="btn-action btn-new" onclick="resetUI()">New</button>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
